input:
  image_dir: "../ImgToTag"
  recursive: false
  extensions:
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".webp"
    - ".bmp"

output:
  results_dir: "../results"

modes:
  - ru_free
  - ru_pool
  - ru_pool_explained
  - en_free
  - en_pool
  - en_pool_explained

pools:
  ru_plain: "../prompts/pools/ru_plain.txt"
  en_plain: "../prompts/pools/en_plain.txt"
  ru_explained: "../prompts/pools/ru_explained_ids.tsv"
  en_explained: "../prompts/pools/en_explained_ids.tsv"

prompt_files:
  ru_free: "../prompts/ru_free.txt"
  ru_pool: "../prompts/ru_pool.txt"
  ru_pool_explained: "../prompts/ru_pool_explained.txt"
  en_free: "../prompts/en_free.txt"
  en_pool: "../prompts/en_pool.txt"
  en_pool_explained: "../prompts/en_pool_explained.txt"

generation:
  temperature: 0.0
  top_p: 1.0
  max_tokens: 4096

load:
  context_length: 8192
  flash_attention: true
  offload_kv_cache_to_gpu: true
  echo_load_config: true

limits:
  max_tags: 10
  timeout_sec: 180
  retries: 1
  limit_images: null

response_formats:
  free_modes:
    primary: "line_tags"
    fallback: "strict_json"
  plain_pool_modes:
    primary: "line_tags"
    fallback: "strict_json"
  explained_pool_modes:
    primary: "line_ids"
    fallback: null

validation:
  # For REST chat transport this only controls parser-side expectations.
  # OpenAI response_format payload is not sent to /api/v1/chat.
  use_response_format: true
  allow_json_extraction: true
  allow_line_fallback: true
  drop_tags_not_in_pool: true
  save_invalid_results: true

diagnostics:
  gpu_memory:
    enabled: true
    command: "nvidia-smi"
    fail_if_unavailable: false
  context:
    record_usage_tokens: true
    warning_ratio: 0.85
    error_ratio: 0.97
    classify_context_errors: true

runtime:
  result_mode: "deterministic"
  unload_model_after_run: true
  resume: true
  retry_failed: true
  sleep_after_load_sec: 2
  image_request_smoke_test: true

report:
  generate_csv: true
  generate_html: true
  open_html_after_run: false
  thumbnail_size: 256

evaluation:
  track_quality_for_manual_review: true
  track_speed: true
  track_json_stability: true
  track_pool_compliance: true
  track_hallucinated_tags: true


